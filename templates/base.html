<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f9; }
        .navbar { background-color: #2c3e50; color: white; padding: 15px 20px; }
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background-color: #34495e; color: white; padding: 20px; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; margin-bottom: 15px; font-size: 16px; }
        .sidebar a:hover { color: #1abc9c; }
        .content { flex: 1; padding: 30px; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Dashboard 2021 - Control de Abarrotes</h2>
    </div>
    <div class="container">
        <div class="sidebar">
            <h3>Menú Principal</h3>
            <hr style="border-color: #7f8c8d; margin-bottom: 20px;">
            <a href="{% url 'inicio' %}"> Inicio</a>
            <a href="#"> Catálogos</a>
            <a href="#"> Ventas</a>
            <a href="#"> Reportes</a>
            <a href="#"> Usuarios</a>
        </div>
        <div class="content">
            <div class="card">
                {% block contenido %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
